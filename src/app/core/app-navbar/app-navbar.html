<nav class="navbar navbar-expand-lg navbar-dark bg-{{color}} container fixed-top rounded-bottom-4">

    <a class="navbar-brand" routerLink="" routerLinkActive="active">
      <img src="./assets/mm-logo.svg" alt="Midwest Mackey Logo" width="45">
    </a>
    <div id="social-links" class="d-flex order-lg-2 rounded-pill">
      <ul class="nav col gap-2">
        <li class="nav-item">
          <a class="nav-link link-light rounded-pill" (click)="isMenuCollapsed = true" href="{{githubBaseURL}}"  title="Github" target="github">
            <fa-icon [icon]="faGithub"></fa-icon>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link link-light rounded-pill" (click)="isMenuCollapsed = true" href="{{linkedinURL}}" title="linkedin" target="linkedin">
            <fa-icon [icon]="faLinkedinIn"></fa-icon>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link link-light rounded-pill" (click)="isMenuCollapsed = true" href="{{instagramURL}}" title="Instagram" target="instagram">
            <fa-icon [icon]="faInstagram"></fa-icon>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link link-light rounded-pill" (click)="isMenuCollapsed = true" href="{{twitchURL}}" title="Twitch" target="twitch">
            <fa-icon [icon]="faTwitch"></fa-icon>
          </a>
        </li>
      </ul>
    </div>
    <button class="navbar-toggler" type="button" (click)="isMenuCollapsed = !isMenuCollapsed"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div [ngbCollapse]="isMenuCollapsed" class="collapse navbar-collapse">
      <div id="navbar-links" class="mt-4 mt-lg-0">
        <ul class="nav nav-pills col gap-2">

          <li class="nav-item">

          </li>
        </ul>
      </div>
    </div>
    <div [ngbCollapse]="isMenuCollapsed" class="collapse navbar-collapse">
      <div id="theme-toggle" class="d-flex ms-auto me-2 rounded-pill float-end">
        <ul class="nav">
          <li class="nav-item">
            <mm-theme-toggle></mm-theme-toggle>
          </li>
        </ul>
      </div>
    </div>
