  <!-- Get theme on load -->
  <script>
    const saved = localStorage.getItem('theme');

    if (saved) {
      document.documentElement.setAttribute('data-bs-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-bs-theme', 'dark');
    }
  </script>

    <!-- White screen error handling -->
   <script>
    window.addEventListener("load", function () {

      // If Angular never bootstrapped after 10s
      setTimeout(function () {

        if (!window.__app_bootstrapped) {

          var ws = document.getElementById("bootstrap-whitescreen");

          if (!ws) {
            ws = document.createElement("div");
            ws.id = "bootstrap-whitescreen";
            ws.style.position = "fixed";
            ws.style.inset = "0";
            ws.style.zIndex = "999999";
            ws.style.paddingTop = "100px";
            ws.style.background = "#0078D7";
            ws.style.color = "white";
            ws.style.padding = "40px";
            ws.innerHTML = "<h1 class=>:(</h1><h2>Application Failed To Start</h2><br><p>The website ran into a problem and is unable to run. Please ensure you are using a modern browser.</p>";

            document.body.appendChild(ws);
          }
        }

      }, 10000);

    });
  </script>
