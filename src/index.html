  <!-- White screen error message -->
  <div id="whitescreen" class="whitescreen">
      <p class="whitescreen-icon">:(</p>
      <p class="whitescreen-message">
        The website ran into a problem and is unable to run.
        Please ensure you are using a modern browser.
      </p>
      <div class="whitescreen-stack">
        <p>Try another device or browser, if issue persist, I apologize, the problem is on my end.</p>
        <p>There is no person to give this error to, sorry...</p>
        <p id="whitescreen-stack"></p>
      </div>
  </div>

  <!-- White screen error handling -->
<script>
  var whitescreen_EMPTY_APP_ROOT_DELAY = 8000;
  var whitescreen_ERROR_DELAY = 5000;
  var whitescreenShown = false;

  function showwhitescreenError(error) {
    if (whitescreenShown) return;
    whitescreenShown = true;

    console.error("Whitescreen Error:", error);

    var whitescreen = document.getElementById("whitescreen");
    var stackEl = document.getElementById("whitescreen-stack");

    if (!whitescreen) return;

    var message = "Unknown error";

    if (error) {
      message =
        (error.stack && String(error.stack)) ||
        (error.message && String(error.message)) ||
        String(error);
    }

    if (stackEl) {
      stackEl.innerHTML = message.replace(/\n/g, "<br/>");
    }

    whitescreen.style.display = "block";
    document.body.style.display = "block"; // keep if using ionic
  }

  // Global JS errors
  window.addEventListener("error", function (event) {
    setTimeout(function () {
      showwhitescreenError(event.error || event.message || event);
    }, whitescreen_ERROR_DELAY);
  });

  // Unhandled promise rejections (VERY important for Angular)
  window.addEventListener("unhandledrejection", function (event) {
    setTimeout(function () {
      showwhitescreenError(event.reason || event);
    }, whitescreen_ERROR_DELAY);
  });

  // Detect empty mm-root safely
  setTimeout(function () {
    if (!window.__app_bootstrapped) {
      showwhitescreenError(new Error("Angular failed to bootstrap"));
    }
  }, whitescreen_EMPTY_APP_ROOT_DELAY);
</script>
